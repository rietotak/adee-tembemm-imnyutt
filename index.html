<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💌 UNTUK HARTIWI PUTRI PRATAMA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="kartu">
            <!-- Lilin cinta -->
            <div class="lilin-area">
                <div class="lilin" id="lilin">
                    <div class="sumbu"></div>
                    <div class="api" id="api"></div>
                    <div class="lilin-body"></div>
                </div>
                <p class="label-lilin" id="labelLilin">🕯pencet geh tembem lilinnya</p>
            </div>

            <!-- Hati besar -->
            <div class="heart-avatar" id="heartAvatar">
                💖
            </div>

            <h2>🌷 UNTUK HARTIWI PUTRI PRATAMA,</h2>
            <h3 id="subJudul">yang paling istimewa di hati kecilku</h3>

            <!-- Kotak gombalan utama (BERURUTAN) -->
            <div class="gombal-container">
                <div class="gombal-isi" id="gombalUtama">
                    "🌸 Halo... ini awal dari cerita kita."
                </div>
                <button class="btn-gombal" id="gombalRandomBtn">📖 Gombal Berikutnya ➡</button>
                <div class="progress-gombal" id="progressGombal">1 / 10</div>
            </div>

            <!-- Pesan rahasia (BERURUTAN) -->
            <div class="rahasia-box" id="rahasiaBox">
                <div class="rahasia-header">🔐 Pesan Rahasia 🔐</div>
                <div class="rahasia-isi" id="rahasiaIsi">✨ klik tombol di bawah ✨</div>
                <button class="btn-rahasia" id="bukaRahasiaBtn">💌 Pesan Selanjutnya ➡</button>
                <div class="progress-rahasia" id="progressRahasia">0 / 6</div>
            </div>

            <!-- Tombol aksi -->
            <div class="aksi-group">
                <button class="aksi-btn" id="btnLove">💕 Cinta Berdebar</button>
                <button class="aksi-btn" id="btnKangen">🥺 Aku Kangen Kamu</button>
                <button class="aksi-btn" id="btnFlower">🌹 Tabur Bunga</button>
            </div>

            <!-- Status area -->
            <div class="status-area" id="statusArea">
                💬 klik tombol-tombol di atas... semuanya berurutan
            </div>
        </div>
    </div>

    <canvas id="loveCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
